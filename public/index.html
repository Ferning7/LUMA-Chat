<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LUMA</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #f8f9fa;
      --border: #e8e8e8;
      --text: #1a1a1a;
      --text2: #666;
      --text3: #aaa;
      --primary: #7859e9;
      --primary-hover: #6347d9;
      --online: #22c55e;
      --offline: #9ca3af;
      --shadow: rgba(0,0,0,0.08);
      --msg-mine-bg: #7859e9;
      --msg-mine-text: #fff;
      --msg-other-bg: #ffffff;
      --msg-other-text: #1a1a1a;
    }

    body.dark {
      --bg: #111118;
      --surface: #1c1c28;
      --surface2: #252535;
      --border: #2a2a40;
      --text: #e8e8f4;
      --text2: #9090b0;
      --text3: #5a5a80;
      --primary: #7859e9;
      --primary-hover: #6347d9;
      --online: #22c55e;
      --offline: #6b7280;
      --shadow: rgba(0,0,0,0.4);
      --msg-mine-bg: #7859e9;
      --msg-mine-text: #fff;
      --msg-other-bg: #252535;
      --msg-other-text: #e8e8f4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.2s, color 0.2s;
    }

    /* ========== LOGIN — dark fixo ========== */
    #tela-entrada {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 24px;
      gap: 14px;
      background: #111118;
    }

    #tela-entrada img.logo-entrada {
      width: 150px;
      object-fit: contain;
      margin-bottom: 2px;
    }

    #tela-entrada h1 {
      font-size: 22px;
      font-weight: 700;
      color: #e8e8f4;
      letter-spacing: 0.3px;
    }

    #tela-entrada h1 span {
      color: var(--primary);
    }

    #tela-entrada p { color: #9090b0; font-size: 14px; }

    #tela-entrada input {
      width: 100%;
      max-width: 320px;
      padding: 14px 16px;
      border: 2px solid #2a2a40;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      background: #1c1c28;
      color: #e8e8f4;
      transition: border-color 0.2s;
    }
    #tela-entrada input:focus { border-color: var(--primary); }
    #tela-entrada input::placeholder { color: #5a5a80; }

    /* Seletor de perfil */
    #role-selector {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 320px;
    }

    .role-btn {
      flex: 1;
      padding: 11px 8px;
      background: #1c1c28;
      border: 2px solid #2a2a40;
      border-radius: 10px;
      color: #9090b0;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .role-btn.ativo {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(120, 89, 233, 0.12);
    }

    /* Campo OAB */
    #oab-field {
      width: 100%;
      max-width: 320px;
    }

    #oab-field input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #2a2a40;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      background: #1c1c28;
      color: #e8e8f4;
      transition: border-color 0.2s;
    }
    #oab-field input:focus { border-color: var(--primary); }
    #oab-field input::placeholder { color: #5a5a80; }

    .oab-hint {
      font-size: 11px;
      color: #5a5a80;
      margin-top: 5px;
      padding-left: 4px;
    }

    .erro { color: #e95978; font-size: 13px; text-align: center; max-width: 320px; }

    #tela-entrada button:not(.role-btn) {
      width: 100%;
      max-width: 320px;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #tela-entrada button:not(.role-btn):hover { background: var(--primary-hover); }

    /* ========== APP ========== */
    #app { display: none; flex-direction: column; height: 100%; }

    /* ========== HEADER ========== */
    #header {
      background: var(--primary);
      color: white;
      padding: 0 12px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
    }

    /* Seção esquerda: botão voltar */
    #header-left {
      display: flex;
      align-items: center;
      width: 44px;
      flex-shrink: 0;
      z-index: 1;
    }

    /* Centro: logo + "Chat" — absolutamente centralizado */
    #header-center {
      position: absolute;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      pointer-events: none;
    }

    #header-center img.logo-header {
      height: 26px;
      object-fit: contain;
    }

    #header-center span {
      font-size: 16px;
      font-weight: 600;
      color: white;
      letter-spacing: 0.2px;
    }

    /* Seção direita: ações */
    #header-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      z-index: 1;
    }

    #header-right .avatar {
      width: 30px;
      height: 30px;
      font-size: 11px;
      flex-shrink: 0;
    }

    #meu-nome-header {
      font-size: 13px;
      font-weight: 500;
      opacity: 0.9;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Botão voltar no header */
    #btn-voltar-header {
      display: none;
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    #btn-voltar-header:hover { background: rgba(255,255,255,0.25); }
    #btn-voltar-header.visivel { display: flex; }

    /* Botões de ícone no header */
    .btn-icon {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.25); }

    /* ========== MAIN BODY ========== */
    #main-body { display: flex; flex: 1; overflow: hidden; }

    /* ========== SIDEBAR ========== */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.2s;
    }

    .sidebar-titulo {
      padding: 14px 16px 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #lista-usuarios { flex: 1; overflow-y: auto; }
    #lista-usuarios::-webkit-scrollbar { width: 4px; }
    #lista-usuarios::-webkit-scrollbar-track { background: transparent; }
    #lista-usuarios::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .user-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .user-item:hover { background: var(--surface2); }
    .user-item.ativo { background: rgba(120, 89, 233, 0.1); }

    .user-info { flex: 1; min-width: 0; }

    .user-nome {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-status-text { font-size: 11px; margin-top: 1px; color: var(--offline); }
    .user-status-text.online { color: var(--online); }

    .badge-unread {
      background: var(--primary);
      color: white;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      flex-shrink: 0;
    }
    .badge-unread.visivel { display: flex; }

    /* Botão apagar na lista de contatos */
    .btn-apagar-item {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .user-item:hover .btn-apagar-item { opacity: 1; }
    .btn-apagar-item:hover { color: #e95978; background: rgba(233, 89, 120, 0.1); }

    #sem-usuarios {
      padding: 24px 16px;
      text-align: center;
      color: var(--text3);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ========== AVATAR ========== */
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: white;
      flex-shrink: 0;
      user-select: none;
      position: relative;
    }

    .status-dot {
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--surface);
      background: var(--offline);
    }
    .status-dot.online { background: var(--online); }

    /* ========== CHAT AREA ========== */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      transition: background 0.2s;
    }

    #chat-vazio {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--text3);
    }
    #chat-vazio svg { opacity: 0.35; }
    #chat-vazio p { font-size: 14px; }

    #chat-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }

    /* --- Chat Header --- */
    #chat-header {
      background: var(--surface);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 11px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #chat-header .avatar { width: 40px; height: 40px; font-size: 15px; }

    #parceiro-nome { font-size: 15px; font-weight: 600; color: var(--text); }
    #parceiro-status { font-size: 12px; color: var(--offline); margin-top: 1px; }
    #parceiro-status.online { color: var(--online); }

    /* Botão apagar conversa */
    .btn-apagar {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .btn-apagar:hover {
      color: #e95978;
      background: rgba(233, 89, 120, 0.1);
    }

    /* --- Messages --- */
    #mensagens {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }
    #mensagens::-webkit-scrollbar { width: 4px; }
    #mensagens::-webkit-scrollbar-track { background: transparent; }
    #mensagens::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; }
    .msg-wrapper.minha { align-self: flex-end; align-items: flex-end; }
    .msg-wrapper.outra { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
    }
    .msg-wrapper.minha .msg-bubble {
      background: var(--msg-mine-bg);
      color: var(--msg-mine-text);
      border-bottom-right-radius: 4px;
    }
    .msg-wrapper.outra .msg-bubble {
      background: var(--msg-other-bg);
      color: var(--msg-other-text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .msg-hora { font-size: 10px; color: var(--text3); margin-top: 3px; padding: 0 4px; }

    /* --- Input --- */
    #area-input {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #input-mensagem {
      flex: 1;
      padding: 11px 16px;
      border: 2px solid var(--border);
      border-radius: 24px;
      font-size: 15px;
      outline: none;
      background: var(--surface2);
      color: var(--text);
      transition: border-color 0.2s, background 0.2s;
    }
    #input-mensagem:focus { border-color: var(--primary); background: var(--surface); }
    #input-mensagem::placeholder { color: var(--text3); }

    #btn-enviar {
      width: 44px;
      height: 44px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    #btn-enviar:hover { background: var(--primary-hover); }
    #btn-enviar:disabled { background: var(--border); cursor: default; }

    /* ========== MODAL APAGAR ========== */
    #modal-apagar {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #modal-apagar[hidden] { display: none; }

    #modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    #modal-box {
      position: relative;
      background: var(--surface);
      border-radius: 16px;
      padding: 24px 20px 20px;
      width: 288px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }

    #modal-box p { font-size: 15px; font-weight: 600; color: var(--text); }
    #modal-box .modal-sub { font-size: 13px; font-weight: 400; color: var(--text2); margin-bottom: 8px; }

    #modal-btns { display: flex; gap: 10px; margin-top: 4px; }

    #modal-btns button {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #modal-btns button:hover { opacity: 0.85; }

    #btn-cancelar-apagar { background: var(--surface2); color: var(--text); }
    #btn-confirmar-apagar { background: #e95978; color: white; }

    /* ========== MOBILE ========== */
    @media (max-width: 640px) {
      #sidebar { width: 100%; min-width: 0; }
      #sidebar.hide { display: none; }
      #chat-area { display: none; }
      #chat-area.show { display: flex; }
      #meu-nome-header { display: none; }
      .btn-apagar-item { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Tela de login -->
  <div id="tela-entrada">
    <img class="logo-entrada" src="/logoLUMA.png" alt="LUMA">
    <h1><span>Chat</span></h1>

    <!-- Seletor de perfil -->
    <div id="role-selector">
      <button class="role-btn" id="btn-role-cliente" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Cliente
      </button>
      <button class="role-btn" id="btn-role-advogado" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Advogado
      </button>
    </div>

    <input id="input-nome" type="text" placeholder="Seu nome..." maxlength="30" autofocus>

    <!-- Campo OAB (apenas para advogado) -->
    <div id="oab-field" hidden>
      <input id="input-oab" type="text" placeholder="Número OAB..." maxlength="20" inputmode="numeric">
      <div class="oab-hint">Somente números (ex: 123456)</div>
    </div>

    <div id="erro-login" class="erro" hidden></div>
    <button id="btn-entrar">Entrar no chat</button>
  </div>

  <!-- App principal -->
  <div id="app">

    <!-- Header -->
    <div id="header">

      <!-- Esquerda: botão voltar -->
      <div id="header-left">
        <button id="btn-voltar-header" title="Voltar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
        </button>
      </div>

      <!-- Centro: logo + Chat (absolutamente centralizado) -->
      <div id="header-center">
        <img class="logo-header" src="/logoLUMA.png" alt="LUMA">
        <span>Chat</span>
      </div>

      <!-- Direita: ações -->
      <div id="header-right">
        <button class="btn-icon" id="btn-tema" title="Modo noturno"></button>
        <div class="avatar" id="meu-avatar"></div>
        <span id="meu-nome-header"></span>
        <button class="btn-icon" id="btn-sair" title="Sair">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Corpo -->
    <div id="main-body">

      <!-- Sidebar -->
      <div id="sidebar">
        <div class="sidebar-titulo">Pessoas</div>
        <div id="lista-usuarios"></div>
      </div>

      <!-- Área de chat -->
      <div id="chat-area">

        <!-- Estado vazio -->
        <div id="chat-vazio">
          <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <p>Selecione uma pessoa para conversar</p>
        </div>

        <!-- Conversa -->
        <div id="chat-content">
          <div id="chat-header">
            <div class="avatar" id="parceiro-avatar"></div>
            <div style="flex:1; min-width:0;">
              <div id="parceiro-nome"></div>
              <div id="parceiro-status"></div>
            </div>
            <button class="btn-apagar" id="btn-apagar" title="Apagar conversa">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                <line x1="10" y1="11" x2="10" y2="17"/>
                <line x1="14" y1="11" x2="14" y2="17"/>
              </svg>
            </button>
          </div>

          <div id="mensagens"></div>

          <div id="area-input">
            <input id="input-mensagem" type="text" placeholder="Digite uma mensagem..." maxlength="500" autocomplete="off">
            <button id="btn-enviar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2" fill="currentColor" stroke="none"/>
              </svg>
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Modal: confirmar apagar -->
  <div id="modal-apagar" hidden>
    <div id="modal-overlay"></div>
    <div id="modal-box">
      <p>Apagar esta conversa?</p>
      <p class="modal-sub">Todas as mensagens serão excluídas permanentemente.</p>
      <div id="modal-btns">
        <button id="btn-cancelar-apagar">Cancelar</button>
        <button id="btn-confirmar-apagar">Apagar</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    // Estado
    let meuNome = null;
    let meuRole = 'cliente';
    let meuOAB   = '';
    let activeChat = null;
    let allUsers = [];
    let unread = {};
    let historicoCache = {};

    // ===== SVG helpers =====
    const SVG_LUA = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
    const SVG_SOL = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;

    // ===== Tema =====
    const isDark = () => document.body.classList.contains('dark');

    if (localStorage.getItem('luma-tema') === 'dark') {
      document.body.classList.add('dark');
    }

    function atualizarIconeTema() {
      document.getElementById('btn-tema').innerHTML = isDark() ? SVG_SOL : SVG_LUA;
    }

    document.getElementById('btn-tema').addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem('luma-tema', isDark() ? 'dark' : 'light');
      atualizarIconeTema();
    });

    atualizarIconeTema();

    // ===== Avatar =====
    const CORES = ['#7859e9','#c4314b','#0078d4','#107c10','#ca5010','#038387','#8764b8','#e3008c'];

    function corAvatar(nome) {
      let h = 0;
      for (const c of nome) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
      return CORES[Math.abs(h) % CORES.length];
    }

    function iniciais(nome) {
      const partes = nome.trim().split(/\s+/).filter(Boolean);
      if (partes.length === 1) return partes[0].slice(0, 2).toUpperCase();
      return (partes[0][0] + partes[partes.length - 1][0]).toUpperCase();
    }

    function preencherAvatar(el, nome, tamanho = 44) {
      el.style.background = corAvatar(nome);
      el.style.width = tamanho + 'px';
      el.style.height = tamanho + 'px';
      el.style.fontSize = Math.round(tamanho * 0.36) + 'px';
      el.textContent = iniciais(nome);
    }

    // ===== DOM =====
    const telaEntrada     = document.getElementById('tela-entrada');
    const appEl           = document.getElementById('app');
    const inputNome       = document.getElementById('input-nome');
    const btnEntrar       = document.getElementById('btn-entrar');
    const erroLogin       = document.getElementById('erro-login');
    const meuAvatar       = document.getElementById('meu-avatar');
    const meuNomeEl       = document.getElementById('meu-nome-header');
    const listaUsuarios   = document.getElementById('lista-usuarios');
    const sidebar         = document.getElementById('sidebar');
    const chatArea        = document.getElementById('chat-area');
    const chatVazio       = document.getElementById('chat-vazio');
    const chatContent     = document.getElementById('chat-content');
    const parceiroAvatar  = document.getElementById('parceiro-avatar');
    const parceiroNome    = document.getElementById('parceiro-nome');
    const parceiroStatus  = document.getElementById('parceiro-status');
    const mensagensDiv    = document.getElementById('mensagens');
    const inputMensagem   = document.getElementById('input-mensagem');
    const btnEnviar       = document.getElementById('btn-enviar');
    const btnSair         = document.getElementById('btn-sair');
    const btnVoltarHeader = document.getElementById('btn-voltar-header');
    const btnApagar       = document.getElementById('btn-apagar');
    const modalApagar     = document.getElementById('modal-apagar');
    const modalOverlay    = document.getElementById('modal-overlay');
    const btnCancelarApagar  = document.getElementById('btn-cancelar-apagar');
    const btnConfirmarApagar = document.getElementById('btn-confirmar-apagar');

    // ===== Seletor de perfil =====
    const btnRoleCliente   = document.getElementById('btn-role-cliente');
    const btnRoleAdvogado  = document.getElementById('btn-role-advogado');
    const oabField         = document.getElementById('oab-field');
    const inputOAB         = document.getElementById('input-oab');

    function selecionarRole(role) {
      meuRole = role;
      btnRoleCliente.classList.toggle('ativo', role === 'cliente');
      btnRoleAdvogado.classList.toggle('ativo', role === 'advogado');
      oabField.hidden = role !== 'advogado';
      if (role === 'cliente') inputOAB.value = '';
    }

    selecionarRole('cliente'); // padrão inicial

    btnRoleCliente.addEventListener('click',  () => selecionarRole('cliente'));
    btnRoleAdvogado.addEventListener('click', () => selecionarRole('advogado'));

    // ===== Login =====
    function entrar() {
      const nome = inputNome.value.trim();
      if (!nome) return;

      if (meuRole === 'advogado') {
        const oab = inputOAB.value.trim();
        if (!oab) {
          erroLogin.textContent = 'Informe o número OAB.';
          erroLogin.hidden = false;
          return;
        }
        if (!/^\d+$/.test(oab)) {
          erroLogin.textContent = 'OAB fora do padrão. Use apenas números.';
          erroLogin.hidden = false;
          return;
        }
        meuOAB = oab;
      }

      erroLogin.hidden = true;
      socket.emit('entrar', { nome, role: meuRole, oab: meuOAB });
    }

    btnEntrar.addEventListener('click', entrar);
    inputNome.addEventListener('keydown', e => { if (e.key === 'Enter') entrar(); });
    inputOAB.addEventListener('keydown',  e => { if (e.key === 'Enter') entrar(); });

    socket.on('entrar_ok', ({ nome, role }) => {
      meuNome = nome;
      meuRole = role;
      telaEntrada.style.display = 'none';
      appEl.style.display = 'flex';
      preencherAvatar(meuAvatar, nome, 30);
      meuNomeEl.textContent = nome;
    });

    socket.on('entrar_erro', ({ motivo }) => {
      erroLogin.textContent = motivo;
      erroLogin.hidden = false;
    });

    // ===== Sair =====
    btnSair.addEventListener('click', () => {
      socket.emit('sair');
      socket.disconnect();

      meuNome = null;
      activeChat = null;
      allUsers = [];
      unread = {};
      historicoCache = {};

      appEl.style.display = 'none';
      telaEntrada.style.display = 'flex';
      inputNome.value = '';
      erroLogin.hidden = true;
      chatContent.style.display = 'none';
      chatVazio.style.display = 'flex';
      sidebar.classList.remove('hide');
      chatArea.classList.remove('show');
      btnVoltarHeader.classList.remove('visivel');

      setTimeout(() => socket.connect(), 150);
    });

    // ===== Lista de usuários =====
    socket.on('usuarios', (lista) => {
      allUsers = lista;
      renderizarUsuarios();
      atualizarChatHeader();
    });

    function renderizarUsuarios() {
      // Advogado vê clientes; cliente vê advogados
      const roleAlvo = meuRole === 'advogado' ? 'cliente' : 'advogado';
      const outros = allUsers.filter(u => u.name !== meuNome && u.role === roleAlvo);
      listaUsuarios.innerHTML = '';

      if (outros.length === 0) {
        const aviso = document.createElement('div');
        aviso.id = 'sem-usuarios';
        aviso.textContent = 'Nenhuma pessoa por aqui ainda.';
        listaUsuarios.appendChild(aviso);
        return;
      }

      outros.sort((a, b) => {
        if (a.online !== b.online) return b.online - a.online;
        return a.name.localeCompare(b.name);
      });

      outros.forEach(u => {
        const item = document.createElement('div');
        item.className = 'user-item' + (u.name === activeChat ? ' ativo' : '');
        item.dataset.nome = u.name;

        const av = document.createElement('div');
        av.className = 'avatar';
        preencherAvatar(av, u.name, 44);
        const dot = document.createElement('div');
        dot.className = 'status-dot' + (u.online ? ' online' : '');
        av.appendChild(dot);

        const info = document.createElement('div');
        info.className = 'user-info';
        const nomeEl = document.createElement('div');
        nomeEl.className = 'user-nome';
        nomeEl.textContent = u.name;
        const statusEl = document.createElement('div');
        statusEl.className = 'user-status-text' + (u.online ? ' online' : '');
        statusEl.textContent = u.online ? 'Online' : 'Offline';
        info.appendChild(nomeEl);
        info.appendChild(statusEl);

        const badge = document.createElement('div');
        badge.className = 'badge-unread' + ((unread[u.name] || 0) > 0 ? ' visivel' : '');
        badge.textContent = (unread[u.name] || 0) > 99 ? '99+' : (unread[u.name] || '');

        const btnLixeira = document.createElement('button');
        btnLixeira.className = 'btn-apagar-item';
        btnLixeira.title = 'Apagar conversa';
        btnLixeira.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>`;
        btnLixeira.addEventListener('click', (e) => {
          e.stopPropagation();
          abrirModalApagar(u.name);
        });

        item.appendChild(av);
        item.appendChild(info);
        item.appendChild(badge);
        item.appendChild(btnLixeira);
        item.addEventListener('click', () => abrirConversa(u.name));
        listaUsuarios.appendChild(item);
      });
    }

    // ===== Abrir conversa =====
    function abrirConversa(nome) {
      activeChat = nome;
      unread[nome] = 0;

      sidebar.classList.add('hide');
      chatArea.classList.add('show');
      chatVazio.style.display = 'none';
      chatContent.style.display = 'flex';
      btnVoltarHeader.classList.add('visivel');

      preencherAvatar(parceiroAvatar, nome, 40);
      parceiroNome.textContent = nome;
      atualizarChatHeader();

      mensagensDiv.innerHTML = '';
      if (historicoCache[nome]) {
        historicoCache[nome].forEach(msg => adicionarMensagem(msg));
      } else {
        socket.emit('carregar_historico', nome);
      }

      renderizarUsuarios();
      inputMensagem.focus();
    }

    function atualizarChatHeader() {
      if (!activeChat) return;
      const user = allUsers.find(u => u.name === activeChat);
      const online = user?.online || false;
      parceiroStatus.className = online ? 'online' : '';
      parceiroStatus.textContent = online ? 'Online' : 'Offline';
    }

    // ===== Voltar (header) =====
    btnVoltarHeader.addEventListener('click', () => {
      activeChat = null;
      sidebar.classList.remove('hide');
      chatArea.classList.remove('show');
      chatContent.style.display = 'none';
      chatVazio.style.display = 'flex';
      btnVoltarHeader.classList.remove('visivel');
      renderizarUsuarios();
    });

    // ===== Histórico =====
    socket.on('historico', ({ com, msgs }) => {
      historicoCache[com] = msgs;
      if (activeChat === com) {
        mensagensDiv.innerHTML = '';
        msgs.forEach(msg => adicionarMensagem(msg));
      }
    });

    // ===== Mensagens =====
    function adicionarMensagem(msg) {
      const isMinha = msg.de === meuNome;
      const wrapper = document.createElement('div');
      wrapper.className = 'msg-wrapper ' + (isMinha ? 'minha' : 'outra');

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = msg.texto;

      const hora = document.createElement('span');
      hora.className = 'msg-hora';
      hora.textContent = msg.hora;

      wrapper.appendChild(bubble);
      wrapper.appendChild(hora);
      mensagensDiv.appendChild(wrapper);
      mensagensDiv.scrollTop = mensagensDiv.scrollHeight;
    }

    socket.on('mensagem_privada', (msg) => {
      const convKey = msg.de === meuNome ? msg.para : msg.de;
      if (!historicoCache[convKey]) historicoCache[convKey] = [];
      historicoCache[convKey].push(msg);

      if (activeChat === convKey) {
        adicionarMensagem(msg);
      } else if (msg.de !== meuNome) {
        unread[msg.de] = (unread[msg.de] || 0) + 1;
        renderizarUsuarios();
      }
    });

    // ===== Enviar =====
    function enviar() {
      const texto = inputMensagem.value.trim();
      if (!texto || !activeChat) return;
      socket.emit('mensagem_privada', { para: activeChat, texto });
      inputMensagem.value = '';
      inputMensagem.focus();
    }

    btnEnviar.addEventListener('click', enviar);
    inputMensagem.addEventListener('keydown', e => { if (e.key === 'Enter') enviar(); });

    // ===== Apagar conversa =====
    let targetDeleteUser = null;

    function abrirModalApagar(nome) {
      targetDeleteUser = nome;
      modalApagar.hidden = false;
    }

    function fecharModal() {
      modalApagar.hidden = true;
      targetDeleteUser = null;
    }

    // Botão apagar no chat-header
    btnApagar.addEventListener('click', () => abrirModalApagar(activeChat));

    modalOverlay.addEventListener('click', fecharModal);
    btnCancelarApagar.addEventListener('click', fecharModal);

    btnConfirmarApagar.addEventListener('click', () => {
      if (!targetDeleteUser) return;
      socket.emit('apagar_conversa', targetDeleteUser);
      fecharModal();
    });

    socket.on('conversa_apagada', ({ com }) => {
      delete historicoCache[com];
      if (activeChat === com) {
        mensagensDiv.innerHTML = '';
      }
    });

    // ===== Reconexão =====
    socket.on('connect', () => {
      if (meuNome) {
        historicoCache = {};
        socket.emit('entrar', { nome: meuNome, role: meuRole, oab: meuOAB });
      }
    });
  </script>
</body>
</html>
